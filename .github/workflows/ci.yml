name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: self-hosted-linux
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          clean: true

      - name: Fetch GITOPS_PAT from Vault (keyless OIDC)
        if: github.actor != 'dependabot[bot]'
        uses: hashicorp/vault-action@v4
        with:
          url: http://vault.vault.svc:8200
          method: jwt
          path: github-actions
          role: gha-stackeye-cli
          jwtGithubAudience: https://github.com/StackEye-IO
          exportEnv: true
          secrets: |
            secret/data/stackeye/ci/gitops-pat token | GITOPS_PAT

      - name: Checkout SDK
        if: github.actor != 'dependabot[bot]'
        uses: actions/checkout@v7
        with:
          repository: StackEye-IO/stackeye-go-sdk
          path: .sdk
          token: ${{ env.GITOPS_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Update replace directive for CI
        if: github.actor != 'dependabot[bot]'
        run: |
          # Update the replace directive to use the locally checked out SDK
          sed -i 's|replace github.com/StackEye-IO/stackeye-go-sdk => .*|replace github.com/StackEye-IO/stackeye-go-sdk => ./.sdk|' go.mod

      - name: Download dependencies
        if: github.actor != 'dependabot[bot]'
        run: go mod download

      - name: Run format check
        if: github.actor != 'dependabot[bot]'
        run: make fmt-check

      - name: Run go vet
        if: github.actor != 'dependabot[bot]'
        run: make vet

      - name: Run linter
        if: github.actor != 'dependabot[bot]'
        run: make lint

      - name: Build binary
        if: github.actor != 'dependabot[bot]'
        run: make build

      - name: Run tests with coverage
        if: github.actor != 'dependabot[bot]'
        run: make coverage-html

      - name: Upload coverage artifact
        if: github.actor != 'dependabot[bot]'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
          retention-days: 7

      - name: Build cross-platform binaries
        if: github.actor != 'dependabot[bot]'
        run: make build-all
